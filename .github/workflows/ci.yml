name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Validate migrations
        run: npm run check:migrations

  agents:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: agents-service/requirements-ci.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install -r agents-service/requirements-ci.txt

      - name: Run agent tests
        run: PYTHONPATH=agents-service python -m pytest agents-service/tests -q
